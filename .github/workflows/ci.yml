name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy

      - name: Lint
        continue-on-error: true
        run: ruff check .

      - name: Type check (best effort)
        continue-on-error: true
        run: mypy --ignore-missing-imports inference.py server/cloud_cost_environment.py

      - name: Unit tests
        run: PYTHONPATH=. pytest tests/test_env.py -q --basetemp /tmp/cco_pytest
